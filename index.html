// -------- Icon helper (Lucide) ----------
function Icon({ name, className = "w-5 h-5", strokeWidth = 2 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", name);
      el.setAttribute("stroke-width", strokeWidth);
      ref.current.appendChild(el);
      window.lucide && window.lucide.createIcons({ attrs: { class: className } });
    }
  }, [name, className, strokeWidth]);
  return <span ref={ref} className={"inline-flex " + className}></span>;
}

async function loadCloud() {
  if (!sb) return null;
  const { data, error } = await sb.from("app_state").select("data").eq("id", 1).single();
  if (error) { console.warn("[supabase load]", error); return null; }
  return data && data.data && Object.keys(data.data).length ? data.data : null;
}
async function saveCloud(state) {
  if (!sb) return;
  const { error } = await sb.from("app_state").upsert({ id: 1, data: state, updated_at: new Date().toISOString() });
  if (error) console.warn("[supabase save]", error);
}

// -------- Helpers ----------
const fmt = (n) => {
  if (n >= 1e6) return (n/1e6).toFixed(1)+"M";
  if (n >= 1e3) return (n/1e3).toFixed(1)+"K";
  return String(n);
};
const cn = (...a)=>a.filter(Boolean).join(" ");
const todayKey = () => new Date().toLocaleDateString(undefined,{month:'short',day:'numeric'});
const isoDay = (d=new Date()) => {
  const x = new Date(d); x.setHours(0,0,0,0);
  const y = x.getFullYear(), m = String(x.getMonth()+1).padStart(2,'0'), dd = String(x.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
};
const addDays = (iso, n) => { const d = new Date(iso); d.setDate(d.getDate()+n); return isoDay(d); };

function DreamScreen({ onEnter }) {

// -------- App ----------
function App() {
  const [state, setState] = useState(() => loadLocal() || seed());
  const [activeId, setActiveId] = useState(state.accounts[0]?.id || null);
  const [view, setView] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [tick, setTick] = useState(0);
  const [showDream, setShowDream] = useState(true);
  const [cloudStatus, setCloudStatus] = useState("loading"); // loading | synced | error | offline
  const skipNextSave = useRef(false);
  const saveTimer = useRef(null);

  // Initial cloud load
  useEffect(() => {
    let alive = true;
    (async () => {
      if (!sb) { setCloudStatus("offline"); return; }
      const cloud = await loadCloud();
      if (!alive) return;
      if (cloud && cloud.accounts) {
        skipNextSave.current = true; // don't echo back what we just loaded
        setState(cloud);
        setActiveId(cloud.accounts[0]?.id || null);
        setCloudStatus("synced");
      } else {
        // first time — push current local state up
        const cur = loadLocal() || seed();
        await saveCloud(cur);
        setCloudStatus("synced");
      }
    })();
    return () => { alive = false; };
  }, []);

  // Realtime subscription — pick up changes from other devices
  useEffect(() => {
    if (!sb) return;
    const ch = sb.channel("app_state_changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "app_state" }, (payload) => {
        const next = payload.new && payload.new.data;
        if (!next) return;
        // Only apply if it differs (avoid loop)
        setState(prev => {
          if (JSON.stringify(prev) === JSON.stringify(next)) return prev;
          skipNextSave.current = true;
          return next;
        });
      })
      .subscribe();
    return () => { sb.removeChannel(ch); };
  }, []);

  // Save: local instantly, cloud debounced
  useEffect(() => {
    saveLocal(state);
    if (skipNextSave.current) { skipNextSave.current = false; return; }
    if (!sb) return;
    setCloudStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      await saveCloud(state);
      setCloudStatus("synced");
    }, 800);
  }, [state]);

  // live "tick" for UI timestamps (no data mutation — real data now comes from cloud + manual logs)
  useEffect(() => {
    const id = setInterval(() => setTick(t => t+1), 4000);
    return () => clearInterval(id);
  }, []);


  const accounts = state.accounts;
  const active = accounts.find(a=>a.id===activeId) || accounts[0];

  const filtered = useMemo(()=>accounts.filter(a =>
    (a.username+a.displayName+a.niche).toLowerCase().includes(search.toLowerCase())
  ), [accounts, search]);

  const totals = useMemo(()=>({
    followers: accounts.reduce((s,a)=>s+a.followers,0),
    views: accounts.reduce((s,a)=>s+a.monthlyViews,0),
    pins: accounts.reduce((s,a)=>s+a.pins,0),
    tasksDone: accounts.reduce((s,a)=>s+a.tasks.filter(t=>t.done).length,0),
    tasksTotal: accounts.reduce((s,a)=>s+a.tasks.length,0),
  }), [accounts]);

  const addAccount = (data) => {
    const a = {
      id: crypto.randomUUID(),
      username: data.username.replace(/^@/,''),
      displayName: data.displayName || data.username,
      gmail: data.gmail || "",
      password: data.password || "",
      niche: data.niche || "General",
      avatarColor: ["#e60023","#0ea5e9","#8b5cf6","#10b981","#f59e0b","#ec4899"][Math.floor(Math.random()*6)],
      followers: Number(data.followers)||0,
      following: Number(data.following)||0,
      monthlyViews: Number(data.monthlyViews)||0,
      pins: Number(data.pins)||0,
      boards: Number(data.boards)||0,
      notes: data.notes||"",
      createdAt: Date.now(),
      tasks: [],
      history: Array.from({length:7}).map((_,i)=>({
        day: new Date(Date.now()-86400000*(6-i)).toLocaleDateString(undefined,{month:'short',day:'numeric'}),
        followers: (Number(data.followers)||0) - (6-i)*5,
        views: Math.floor((Number(data.monthlyViews)||0)/30),
        pins: Number(data.pins)||0
      }))
    };
    setState(s => ({...s, accounts:[...s.accounts, a]}));
    setActiveId(a.id);
    setShowAdd(false);
  };

  const deleteAccount = (id) => {
    if (!confirm("Delete this account and all its tasks?")) return;
    setState(s => ({...s, accounts: s.accounts.filter(a=>a.id!==id)}));
  };

  const updateAccount = (id, patch) => {
    setState(s => ({...s, accounts: s.accounts.map(a=>a.id===id?{...a,...patch}:a)}));
  };

  const addTask = (accId, title) => {
    if (!title.trim()) return;
    updateAccount(accId, {
      tasks: [...accounts.find(a=>a.id===accId).tasks,
        { id: crypto.randomUUID(), title: title.trim(), done:false, createdAt:Date.now() }]
    });
  };
  const toggleTask = (accId, taskId) => {
    const a = accounts.find(x=>x.id===accId);
    updateAccount(accId, { tasks: a.tasks.map(t=>t.id===taskId?{...t,done:!t.done, doneAt: !t.done?Date.now():null}:t) });
  };
  const deleteTask = (accId, taskId) => {
    const a = accounts.find(x=>x.id===accId);
    updateAccount(accId, { tasks: a.tasks.filter(t=>t.id!==taskId) });
  };

  // Log a daily update: replaces today's entry in history (or appends), and syncs current metrics
  const logDailyUpdate = (accId, entry) => {
    const a = accounts.find(x=>x.id===accId);
    if (!a) return;
    const day = todayKey();
    const num = (v, fb) => (v===""||v==null||isNaN(Number(v))) ? fb : Number(v);
    const next = {
      day,
      followers: num(entry.followers, a.followers),
      views: num(entry.views, 0),
      pins: num(entry.pins, a.pins)
    };
    let history = [...a.history];
    const idx = history.findIndex(h=>h.day===day);
    if (idx>=0) history[idx] = next; else history = [...history.slice(-29), next];
    const monthlyViews = history.slice(-30).reduce((s,h)=>s+(h.views||0),0);
    updateAccount(accId, {
      history,
      followers: next.followers,
      pins: next.pins,
      monthlyViews,
      lastUpdate: Date.now()
    });
  };

  // Brahmacharya diary handlers
  const brahma = state.brahma || { entries: {} };
  const setBrahmaEntry = (iso, patch) => {
    setState(s => {
      const b = s.brahma || { entries: {} };
      const cur = b.entries[iso] || { status: "clean", count: 0, note: "" };
      const next = { ...cur, ...patch };
      return { ...s, brahma: { ...b, entries: { ...b.entries, [iso]: next } } };
    });
  };
  const clearBrahmaEntry = (iso) => {
    setState(s => {
      const b = s.brahma || { entries: {} };
      const e = { ...b.entries }; delete e[iso];
      return { ...s, brahma: { ...b, entries: e } };
    });
  };

  // Weight handlers
  const weight = state.weight || { target: 60, entries: {} };
  const setWeightEntry = (iso, patch) => {
    setState(s => {
      const w = s.weight || { target: 60, entries: {} };
      const cur = w.entries[iso] || { morning: "", evening: "", note: "" };
      return { ...s, weight: { ...w, entries: { ...w.entries, [iso]: { ...cur, ...patch } } } };
    });
  };
  const clearWeightEntry = (iso) => {
    setState(s => {
      const w = s.weight || { target: 60, entries: {} };
      const e = { ...w.entries }; delete e[iso];
      return { ...s, weight: { ...w, entries: e } };
    });
  };
  const setWeightTarget = (n) => {
    setState(s => ({ ...s, weight: { ...(s.weight||{entries:{}}), target: Number(n)||60 } }));
  };

  if (showDream) return <DreamScreen onEnter={()=>setShowDream(false)}/>;

  return (
    <div className="min-h-screen flex">
      {/* Sidebar */}
      <aside className="w-72 bg-white border-r border-zinc-200 flex flex-col">
        <div className="p-5 border-b border-zinc-200 flex items-center gap-3">
          <div className="w-9 h-9 rounded-full bg-brand-500 text-white grid place-items-center font-bold">P</div>
          <div>
            <div className="font-bold text-zinc-900">PinVault</div>
            <div className="text-xs text-zinc-500 flex items-center gap-1.5">
              <span className={cn("w-2 h-2 rounded-full",
                cloudStatus==="synced" ? "bg-green-500 pulse-dot" :
                cloudStatus==="saving" ? "bg-amber-500 animate-pulse" :
                cloudStatus==="loading" ? "bg-sky-500 animate-pulse" :
                "bg-zinc-400"
              )}></span>
              {cloudStatus==="synced" ? "Cloud · synced" :
               cloudStatus==="saving" ? "Saving…" :
               cloudStatus==="loading" ? "Loading…" :
               "Offline"}
            </div>
          </div>
        </div>

        <nav className="p-3 space-y-1">
          <button onClick={()=>setShowDream(true)}
            className="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold bg-gradient-to-r from-brand-500 to-pink-500 text-white hover:opacity-90 transition mb-1">
            <Icon name="flame" className="w-4 h-4"/>The Dream
          </button>
          {[
            ["dashboard","Dashboard","layout-dashboard"],
            ["daily","Admin panel","sliders-horizontal"],
            ["brahma","BM diary","shield"],
            ["weight","Weight panel","scale"],
            ["analytics","Analytics","bar-chart-3"],
          ].map(([k,label,icon])=>(
            <button key={k}
              onClick={()=>setView(k)}
              className={cn("w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition",
                view===k?"bg-brand-50 text-brand-600":"text-zinc-600 hover:bg-zinc-100")}>
              <Icon name={icon} className="w-4 h-4"/>{label}
            </button>
          ))}
        </nav>

        <div className="px-3 pb-2 flex items-center justify-between">
          <div className="text-xs uppercase tracking-wide text-zinc-400 font-semibold">Accounts</div>
          <button onClick={()=>setShowAdd(true)} className="text-brand-600 hover:bg-brand-50 rounded p-1">
            <Icon name="plus" className="w-4 h-4"/>
          </button>
        </div>

        <div className="px-3 pb-2">
          <div className="relative">
            <Icon name="search" className="w-4 h-4 absolute left-2.5 top-2.5 text-zinc-400"/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
              className="w-full pl-8 pr-3 py-2 bg-zinc-100 rounded-lg text-sm outline-none focus:bg-white focus:ring-2 ring-brand-500/30"/>
          </div>
        </div>

        <div className="flex-1 overflow-y-auto scrollbar-thin px-2 pb-3 space-y-1">
          {filtered.map(a=>{
            const done = a.tasks.filter(t=>t.done).length;
            const total = a.tasks.length;
            return (
              <button key={a.id}
                onClick={()=>{setActiveId(a.id); setView("account")}}
                className={cn("w-full flex items-center gap-3 px-2 py-2 rounded-lg text-left transition",
                  activeId===a.id && view==="account" ?"bg-zinc-100":"hover:bg-zinc-50")}>
                <div className="w-9 h-9 rounded-full grid place-items-center text-white font-semibold text-sm flex-shrink-0"
                  style={{background:a.avatarColor}}>
                  {a.displayName.slice(0,1).toUpperCase()}
                </div>
                <div className="min-w-0 flex-1">
                  <div className="text-sm font-medium text-zinc-900 truncate">{a.displayName}</div>
                  <div className="text-xs text-zinc-500 truncate">@{a.username} · {fmt(a.followers)}</div>
                </div>
                {total>0 && (
                  <div className={cn("text-[10px] px-1.5 py-0.5 rounded-full font-medium",
                    done===total?"bg-green-100 text-green-700":"bg-amber-100 text-amber-700")}>
                    {done}/{total}
                  </div>
                )}
              </button>
            );
          })}
          {filtered.length===0 && (
            <div className="text-center text-sm text-zinc-400 py-8">No accounts yet</div>
          )}
        </div>

        <div className="p-3 border-t border-zinc-200 text-[11px] text-zinc-400">
          Last update: {new Date().toLocaleTimeString()}
        </div>
      </aside>

      {/* Main */}
      <main className="flex-1 overflow-y-auto">
        {view==="dashboard" && (
          <Dashboard totals={totals} accounts={accounts} onOpen={(id)=>{setActiveId(id);setView("account")}} onAdd={()=>setShowAdd(true)} tick={tick}/>
        )}
        {view==="account" && active && (
          <AccountView a={active}
            onUpdate={(p)=>updateAccount(active.id,p)}
            onDelete={()=>deleteAccount(active.id)}
            onAddTask={(t)=>addTask(active.id,t)}
            onToggleTask={(tid)=>toggleTask(active.id,tid)}
            onDeleteTask={(tid)=>deleteTask(active.id,tid)}
            tick={tick}
          />
        )}
        {view==="analytics" && (
          <Analytics accounts={accounts}/>
        )}
        {view==="daily" && (
          <DailyUpdate
            accounts={accounts}
            onLog={logDailyUpdate}
            onAdd={addAccount}
            onDelete={deleteAccount}
            onRename={(id,patch)=>updateAccount(id,patch)}
          />
        )}
        {view==="brahma" && (
          <BrahmaDiary entries={brahma.entries} onSet={setBrahmaEntry} onClear={clearBrahmaEntry}
            onResetAll={()=>{
              if(confirm("Reset entire BM diary? This deletes all entries permanently.")){
                setState(s => ({...s, brahma: { entries: {} }}));
              }
            }}/>
        )}
        {view==="weight" && (
          <WeightPanel weight={weight} onSet={setWeightEntry} onClear={clearWeightEntry} onTarget={setWeightTarget}/>
        )}
      </main>

      {showAdd && <AddAccountModal onClose={()=>setShowAdd(false)} onAdd={addAccount}/>}
    </div>
  );
}

// -------- Dashboard ----------
function Dashboard({ totals, accounts, onOpen, onAdd, tick }) {
  const completion = totals.tasksTotal? Math.round(totals.tasksDone/totals.tasksTotal*100):0;
  const aggregateHistory = useMemo(()=>{
    if (accounts.length===0) return [];
    const len = accounts[0].history.length;
    return Array.from({length:len}).map((_,i)=>{
      const day = accounts[0].history[i].day;
      return {
        day,
        followers: accounts.reduce((s,a)=>s+(a.history[i]?.followers||0),0),
        views: accounts.reduce((s,a)=>s+(a.history[i]?.views||0),0)
      };
    });
  }, [accounts, tick]);

  return (
    <div className="p-8 max-w-7xl mx-auto">
      <header className="flex items-center justify-between mb-8">
        <div>
          <h1 className="text-3xl font-bold text-zinc-900">Dashboard</h1>
          <p className="text-zinc-500 mt-1">All your Pinterest accounts, one place. Real-time sync active.</p>
        </div>
        <button onClick={onAdd} className="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2.5 rounded-lg flex items-center gap-2 font-medium shadow-sm">
          <Icon name="plus" className="w-4 h-4"/> Add account
        </button>
      </header>

      <section className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <StatCard icon="users" label="Total followers" value={fmt(totals.followers)} accent="bg-brand-500"/>
        <StatCard icon="eye" label="Monthly views" value={fmt(totals.views)} accent="bg-sky-500"/>
        <StatCard icon="image" label="Pins" value={fmt(totals.pins)} accent="bg-violet-500"/>
        <StatCard icon="check-circle-2" label="Tasks completed"
          value={`${totals.tasksDone}/${totals.tasksTotal}`}
          sub={`${completion}% done`} accent="bg-emerald-500"/>
      </section>

      <section className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-6">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h3 className="font-semibold text-zinc-900">Followers growth (all accounts)</h3>
              <p className="text-xs text-zinc-500">Aggregated · last {aggregateHistory.length} days</p>
            </div>
            <span className="text-xs flex items-center gap-1.5 text-green-600">
              <span className="w-2 h-2 rounded-full bg-green-500 pulse-dot"></span> live
            </span>
          </div>
          <div className="h-64">
            <ResponsiveContainer>
              <AreaChart data={aggregateHistory}>
                <defs>
                  <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#e60023" stopOpacity={0.35}/>
                    <stop offset="100%" stopColor="#e60023" stopOpacity={0}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#f1f1f1"/>
                <XAxis dataKey="day" tick={{fontSize:11}} stroke="#a1a1aa"/>
                <YAxis tick={{fontSize:11}} stroke="#a1a1aa"/>
                <Tooltip/>
                <Area type="monotone" dataKey="followers" stroke="#e60023" fill="url(#g1)" strokeWidth={2}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div className="bg-white rounded-2xl border border-zinc-200 p-6">
          <h3 className="font-semibold text-zinc-900 mb-4">Task completion</h3>
          <div className="flex items-center justify-center h-48">
            <div className="relative w-40 h-40">
              <svg viewBox="0 0 36 36" className="w-full h-full -rotate-90">
                <circle cx="18" cy="18" r="15.9155" fill="none" stroke="#f4f4f5" strokeWidth="3"/>
                <circle cx="18" cy="18" r="15.9155" fill="none" stroke="#10b981" strokeWidth="3"
                  strokeDasharray={`${completion}, 100`} strokeLinecap="round"/>
              </svg>
              <div className="absolute inset-0 grid place-items-center">
                <div className="text-center">
                  <div className="text-3xl font-bold text-zinc-900">{completion}%</div>
                  <div className="text-xs text-zinc-500">{totals.tasksDone}/{totals.tasksTotal} tasks</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-zinc-900">Your accounts</h3>
          <span className="text-xs text-zinc-500">{accounts.length} total</span>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {accounts.map(a=>(
            <AccountCard key={a.id} a={a} onClick={()=>onOpen(a.id)}/>
          ))}
          <button onClick={onAdd}
            className="border-2 border-dashed border-zinc-300 rounded-2xl p-6 hover:border-brand-500 hover:bg-brand-50/50 transition flex flex-col items-center justify-center text-zinc-500 hover:text-brand-600 min-h-[180px]">
            <Icon name="plus-circle" className="w-8 h-8 mb-2"/>
            <span className="font-medium">Add new account</span>
          </button>
        </div>
      </section>

// -------- Account view ----------
function AccountView({ a, onUpdate, onDelete, onAddTask, onToggleTask, onDeleteTask, tick }) {

              onUpdate({

              <h3 className="font-semibold text-zinc-900 mb-4">Daily views</h3>

                <ResponsiveContainer>
                  <BarChart data={a.history}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#f1f1f1"/>
                    <XAxis dataKey="day" tick={{fontSize:10}} stroke="#a1a1aa"/>
                    <YAxis tick={{fontSize:10}} stroke="#a1a1aa"/>
                    <Tooltip/>
                    <Bar dataKey="views" fill="#0ea5e9" radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
            <div className="bg-white border border-zinc-200 rounded-2xl p-5">
              <h3 className="font-semibold text-zinc-900 mb-4">Pin growth</h3>
              <div className="h-48">
                <ResponsiveContainer>
                  <AreaChart data={a.history}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#f1f1f1"/>
                    <XAxis dataKey="day" tick={{fontSize:10}} stroke="#a1a1aa"/>
                    <YAxis tick={{fontSize:10}} stroke="#a1a1aa"/>
                    <Tooltip/>
                    <Area type="monotone" dataKey="pins" stroke="#8b5cf6" fill="#ddd6fe"/>
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>
          {a.notes && (
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5">
              <div className="text-xs uppercase tracking-wide text-amber-700 font-semibold mb-1">Notes</div>
              <div className="text-sm text-amber-900 whitespace-pre-wrap">{a.notes}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function CredentialsBar({ gmail, password }) {
  const [show, setShow] = useState(false);
  const [copied, setCopied] = useState("");
  const copy = (val, label) => {
    navigator.clipboard?.writeText(val);
    setCopied(label);
    setTimeout(()=>setCopied(""), 1500);
  };
  return (
    <div className="bg-white border border-zinc-200 rounded-2xl p-4 mb-6 flex flex-wrap items-center gap-4">
      <div className="flex items-center gap-2 text-sm">
        <Icon name="mail" className="w-4 h-4 text-zinc-400"/>
        <span className="font-mono text-zinc-800">{gmail || <span className="text-zinc-400">no gmail</span>}</span>
        {gmail && (
          <button onClick={()=>copy(gmail,"gmail")} className="text-zinc-400 hover:text-brand-500 p-1">
            <Icon name={copied==="gmail"?"check":"copy"} className="w-3.5 h-3.5"/>
          </button>
        )}
      </div>
      <div className="flex items-center gap-2 text-sm">
        <Icon name="key-round" className="w-4 h-4 text-zinc-400"/>
        <span className="font-mono text-zinc-800">
          {password ? (show ? password : "•".repeat(Math.min(password.length, 12))) : <span className="text-zinc-400">no password</span>}
        </span>
        {password && (
          <>
            <button onClick={()=>setShow(s=>!s)} className="text-zinc-400 hover:text-brand-500 p-1">
              <Icon name={show?"eye-off":"eye"} className="w-3.5 h-3.5"/>
            </button>
            <button onClick={()=>copy(password,"pw")} className="text-zinc-400 hover:text-brand-500 p-1">
              <Icon name={copied==="pw"?"check":"copy"} className="w-3.5 h-3.5"/>
            </button>
          </>
        )}
      </div>
      <span className="text-[11px] text-zinc-400 ml-auto flex items-center gap-1">
        <Icon name="lock" className="w-3 h-3"/> stored locally only
      </span>
    </div>
  );
}

function Stat({k,v}){
  return (
    <div className="bg-white border border-zinc-200 rounded-xl p-4">
      <div className="text-[10px] uppercase tracking-wide text-zinc-500 font-semibold">{k}</div>
      <div className="text-xl font-bold text-zinc-900 mt-1">{v}</div>
    </div>
  );
}

// -------- Analytics ----------
function Analytics({ accounts }) {
  const byNiche = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{ m[a.niche]=(m[a.niche]||0)+a.followers; });
    return Object.entries(m).map(([name,value])=>({name,value}));
  }, [accounts]);

  const compare = accounts.map(a=>({name:a.displayName, followers:a.followers, views:a.monthlyViews, pins:a.pins}));
  const colors = ["#e60023","#0ea5e9","#8b5cf6","#10b981","#f59e0b","#ec4899","#14b8a6"];

  const tasksByAcc = accounts.map(a=>({
    name:a.displayName,
    done:a.tasks.filter(t=>t.done).length,
    open:a.tasks.filter(t=>!t.done).length
  }));

  return (
    <div className="p-8 max-w-7xl mx-auto">
      <header className="mb-8">
        <h1 className="text-3xl font-bold text-zinc-900">Analytics</h1>
        <p className="text-zinc-500 mt-1">Cross-account performance & productivity insights.</p>

function DailyUpdate({ accounts, onLog, onAdd, onDelete, onRename }) {
  const [drafts, setDrafts] = useState(()=>{
    const o={};
    accounts.forEach(a=>{
      const today = a.history.find(h=>h.day===todayKey());
      o[a.id] = {
        followers: today?.followers ?? a.followers,
        views: today?.views ?? "",
        pins: today?.pins ?? a.pins
      };
    });
    return o;
  });
  const [savedAt, setSavedAt] = useState({});
  const [showAdd, setShowAdd] = useState(false);
  const blankNew = { username:"", displayName:"", gmail:"", password:"", niche:"", followers:0, following:0, monthlyViews:0, pins:0, boards:0, notes:"" };
  const [newAcc, setNewAcc] = useState(blankNew);
  const submitNew = () => {
    if (!newAcc.username.trim()) { alert("Username is required"); return; }
    onAdd(newAcc);
    setNewAcc(blankNew);
    setShowAdd(false);
  };

  const save1 = (id) => {
    onLog(id, drafts[id]);
    setSavedAt(s=>({...s,[id]:Date.now()}));
    setTimeout(()=>setSavedAt(s=>{const c={...s};delete c[id];return c;}), 2000);
  };

    accounts.forEach(a=>onLog(a.id, drafts[a.id]));
    const now=Date.now(); const all={};
    accounts.forEach(a=>all[a.id]=now); setSavedAt(all);
    setTimeout(()=>setSavedAt({}), 2000);

    const t = a.history.find(h=>h.day===todayKey());

// -------- Brahmacharya Diary ----------
function BrahmaDiary({ entries, onSet, onClear, onResetAll }) {
  const today = isoDay();
  const todayEntry = entries[today] || { status: "clean", count: 0, note: "" };
  const [note, setNote] = useState(todayEntry.note || "");
  useEffect(()=>{ setNote(entries[today]?.note || ""); }, [today, entries[today]?.note]);

  // streak from today backwards: consecutive clean days (count 0)
  const currentStreak = useMemo(()=>{
    let s = 0, day = today;
    while (true) {
      const e = entries[day];
      if (e && e.status === "slip") break;
      // if no entry and day is today, treat as clean-by-default but count anyway? require entry
      if (!e) break;
      s++; day = addDays(day, -1);
    }
    return s;
  }, [entries, today]);

  // longest streak across all entries
  const longestStreak = useMemo(()=>{
    const days = Object.keys(entries).sort();
    if (days.length===0) return 0;
    let best=0, cur=0, prev=null;
    for (const d of days) {
      const e = entries[d];
      if (e.status==="slip") { cur=0; prev=d; continue; }
      if (prev && addDays(prev,1)===d) cur++; else cur=1;
      if (cur>best) best=cur;
      prev=d;
    }
    return best;
  }, [entries]);

  // month stats
  const mPrefix = today.slice(0,7);
  const monthEntries = Object.entries(entries).filter(([d])=>d.startsWith(mPrefix));
  const monthClean = monthEntries.filter(([,e])=>e.status==="clean").length;
  const monthSlips = monthEntries.reduce((s,[,e])=>s+(e.status==="slip"?(e.count||1):0),0);

  // calendar for current month
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDow = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i=0; i<firstDow; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const setStatus = (status) => {
    onSet(today, { status, count: status==="slip" ? Math.max(1, todayEntry.count||1) : 0, note });
  };
  const incCount = (delta) => {
    const next = Math.max(0, (todayEntry.count||0) + delta);
    onSet(today, { status: next>0?"slip":"clean", count: next, note });
  };
  const saveNote = () => onSet(today, { note });

  return (
    <div className="p-8 max-w-6xl mx-auto">
      <header className="mb-6 flex items-start justify-between gap-4">
        <div>
          <h1 className="text-3xl font-bold text-zinc-900 flex items-center gap-2">
            <Icon name="shield" className="w-7 h-7 text-violet-600"/> BM Diary
          </h1>
          <p className="text-zinc-500 mt-1">Honest daily check-in. The wall protects the dream.</p>
        </div>
        <button onClick={onResetAll}
          className="px-3 py-2 rounded-lg border border-red-200 text-red-600 text-sm font-medium hover:bg-red-50 flex items-center gap-2">
          <Icon name="rotate-ccw" className="w-4 h-4"/> Reset diary
        </button>
      </header>

      {/* Streak hero */}
      <div className="relative overflow-hidden rounded-3xl p-8 mb-6 bg-gradient-to-br from-violet-600 via-fuchsia-600 to-pink-600 text-white">
        <div className="absolute -top-16 -right-16 w-64 h-64 rounded-full bg-white/10 blur-2xl"/>
        <div className="relative grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
          <div>
            <div className="text-xs uppercase tracking-[0.2em] text-white/70">Current streak</div>
            <div className="text-7xl font-extrabold tabular-nums leading-none mt-1">{currentStreak}</div>
            <div className="text-sm text-white/80 mt-1">clean day{currentStreak===1?"":"s"} in a row</div>
          </div>
          <div className="grid grid-cols-2 gap-3 md:col-span-2">
            <div className="bg-white/10 rounded-2xl p-4 backdrop-blur">
              <div className="text-[10px] uppercase tracking-[0.2em] text-white/70">Longest streak</div>
              <div className="text-2xl font-bold mt-1">{longestStreak} days</div>
            </div>
            <div className="bg-white/10 rounded-2xl p-4 backdrop-blur">
              <div className="text-[10px] uppercase tracking-[0.2em] text-white/70">This month · clean</div>
              <div className="text-2xl font-bold mt-1">{monthClean} days</div>
            </div>
            <div className="bg-white/10 rounded-2xl p-4 backdrop-blur">
              <div className="text-[10px] uppercase tracking-[0.2em] text-white/70">This month · slips</div>
              <div className="text-2xl font-bold mt-1">{monthSlips}</div>
            </div>
            <div className="bg-white/10 rounded-2xl p-4 backdrop-blur">
              <div className="text-[10px] uppercase tracking-[0.2em] text-white/70">Days until 31 Dec</div>
              <div className="text-2xl font-bold mt-1">
                {Math.max(0, Math.ceil((new Date("2026-12-31").getTime()-Date.now())/86400000))}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* Today check-in */}
        <div className="bg-white border border-zinc-200 rounded-2xl p-6 lg:col-span-1">
          <div className="text-xs uppercase tracking-wide text-zinc-500 font-semibold mb-1">Today</div>
          <div className="text-lg font-bold text-zinc-900 mb-4">
            {new Date().toLocaleDateString(undefined,{weekday:'long', day:'numeric', month:'long'})}
          </div>

          <div className="grid grid-cols-2 gap-2 mb-4">
            <button onClick={()=>setStatus("clean")}
              className={cn("py-3 rounded-xl font-semibold text-sm border-2 flex items-center justify-center gap-2 transition",
                todayEntry.status==="clean" && (todayEntry.count||0)===0
                  ? "bg-emerald-500 text-white border-emerald-500"
                  : "bg-white text-emerald-700 border-emerald-200 hover:border-emerald-500")}>
              <Icon name="check-circle-2" className="w-4 h-4"/> Clean
            </button>
            <button onClick={()=>setStatus("slip")}
              className={cn("py-3 rounded-xl font-semibold text-sm border-2 flex items-center justify-center gap-2 transition",
                todayEntry.status==="slip"
                  ? "bg-red-500 text-white border-red-500"
                  : "bg-white text-red-700 border-red-200 hover:border-red-500")}>
              <Icon name="x-circle" className="w-4 h-4"/> Slipped
            </button>
          </div>

          {todayEntry.status==="slip" && (
            <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl">
              <div className="text-xs uppercase tracking-wide text-red-700 font-semibold mb-2">How many times today?</div>
              <div className="flex items-center gap-3">
                <button onClick={()=>incCount(-1)} className="w-9 h-9 rounded-lg border border-red-300 text-red-700 hover:bg-red-100 grid place-items-center">
                  <Icon name="minus" className="w-4 h-4"/>
                </button>
                <div className="text-3xl font-extrabold text-red-700 tabular-nums w-12 text-center">{todayEntry.count||0}</div>
                <button onClick={()=>incCount(1)} className="w-9 h-9 rounded-lg border border-red-300 text-red-700 hover:bg-red-100 grid place-items-center">
                  <Icon name="plus" className="w-4 h-4"/>
                </button>
                <span className="text-xs text-red-700/80 ml-auto">occurrence{(todayEntry.count||0)===1?"":"s"}</span>
              </div>
            </div>
          )}

          <label className="text-xs uppercase tracking-wide text-zinc-500 font-semibold">Note / trigger / lesson</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} onBlur={saveNote}
            rows="4" placeholder="What triggered it? What will you do differently tomorrow?"
            className="w-full mt-1 px-3 py-2 rounded-lg border border-zinc-200 text-sm focus:ring-2 ring-violet-500/30 outline-none resize-none"/>
          <div className="flex justify-between items-center mt-2">
            <button onClick={saveNote} className="bg-violet-600 hover:bg-violet-700 text-white px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5">
              <Icon name="save" className="w-3.5 h-3.5"/> Save note
            </button>
            {entries[today] && (
              <button onClick={()=>{ if(confirm("Clear today's entry?")) onClear(today); }}
                className="text-xs text-zinc-400 hover:text-red-500">clear today</button>
            )}
          </div>
        </div>

        {/* Calendar */}
        <div className="bg-white border border-zinc-200 rounded-2xl p-6 lg:col-span-2">
          <div className="flex items-center justify-between mb-4">
            <div className="font-semibold text-zinc-900">
              {now.toLocaleDateString(undefined,{month:'long', year:'numeric'})}
            </div>
            <div className="flex items-center gap-3 text-xs text-zinc-500">
              <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-500"></span>clean</span>
              <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-red-500"></span>slip</span>
              <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-zinc-200"></span>no entry</span>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-1.5 text-center text-[10px] uppercase tracking-wide text-zinc-400 mb-2">
            {["S","M","T","W","T","F","S"].map((d,i)=><div key={i}>{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1.5">
            {cells.map((d,i)=>{
              if (d===null) return <div key={i}/>;
              const iso = isoDay(new Date(year, month, d));
              const e = entries[iso];
              const isToday = iso === today;
              let bg = "bg-zinc-100 text-zinc-500";
              if (e?.status === "clean") bg = "bg-emerald-500 text-white";
              else if (e?.status === "slip") bg = "bg-red-500 text-white";
              return (
                <button key={i} title={e ? (e.status==="slip" ? `Slipped · ${e.count||1}× — ${e.note||""}` : `Clean${e.note?" — "+e.note:""}`) : ""}
                  onClick={()=>{
                    const s = prompt(`${iso}\nType: c = clean, s = slip, x = clear`, e?.status==="slip"?"s":(e?.status==="clean"?"c":"c"));
                    if (s===null) return;
                    const v = s.trim().toLowerCase();
                    if (v==="x") onClear(iso);
                    else if (v==="s") {
                      const n = parseInt(prompt("How many times?", String(e?.count||1)),10);
                      onSet(iso, { status:"slip", count: isNaN(n)?1:Math.max(1,n), note: e?.note||"" });
                    } else {
                      onSet(iso, { status:"clean", count:0, note: e?.note||"" });
                    }
                  }}
                  className={cn("aspect-square rounded-lg text-sm font-semibold flex flex-col items-center justify-center transition hover:scale-105",
                    bg, isToday && "ring-2 ring-violet-500 ring-offset-1")}>
                  <span>{d}</span>
                  {e?.status==="slip" && (e.count||1)>1 && (
                    <span className="text-[9px] font-bold opacity-90">×{e.count}</span>
                  )}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Recent log */}
      <div className="mt-6 bg-white border border-zinc-200 rounded-2xl p-6">
        <div className="font-semibold text-zinc-900 mb-3 flex items-center gap-2">
          <Icon name="book-open" className="w-4 h-4"/> Recent entries
        </div>
        {Object.keys(entries).length===0 ? (
          <div className="text-sm text-zinc-400 text-center py-6">No entries yet — check in today.</div>
        ) : (
          <div className="divide-y divide-zinc-100">
            {Object.entries(entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14).map(([d,e])=>(
              <div key={d} className="py-3 flex items-start gap-3">
                <div className={cn("w-2 h-2 rounded-full mt-2 flex-shrink-0", e.status==="slip"?"bg-red-500":"bg-emerald-500")}/>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-zinc-900">
                    {new Date(d).toLocaleDateString(undefined,{weekday:'short', day:'numeric', month:'short'})}
                    <span className={cn("ml-2 text-xs font-semibold", e.status==="slip"?"text-red-600":"text-emerald-600")}>
                      {e.status==="slip" ? `Slipped ×${e.count||1}` : "Clean"}
                    </span>
                  </div>
                  {e.note && <div className="text-xs text-zinc-500 mt-0.5 whitespace-pre-wrap">{e.note}</div>}
                </div>
                <button onClick={()=>{ if(confirm("Delete this entry?")) onClear(d); }}
                  className="text-zinc-300 hover:text-red-500"><Icon name="x" className="w-4 h-4"/></button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// -------- Weight Panel ----------
function WeightPanel({ weight, onSet, onClear, onTarget }) {
  const entries = weight.entries || {};
  const target = weight.target ?? 60;
  const today = isoDay();
  const todayEntry = entries[today] || { morning:"", evening:"", note:"" };
  const [m, setM] = useState(todayEntry.morning ?? "");
  const [e, setE] = useState(todayEntry.evening ?? "");
  const [n, setN] = useState(todayEntry.note ?? "");
  useEffect(()=>{
    setM(entries[today]?.morning ?? "");
    setE(entries[today]?.evening ?? "");
    setN(entries[today]?.note ?? "");
  }, [today, entries[today]?.morning, entries[today]?.evening, entries[today]?.note]);

  const sortedDays = Object.keys(entries).sort();
  const chartData = sortedDays.map(d => {
    const v = entries[d];
    const morning = Number(v.morning) || null;
    const evening = Number(v.evening) || null;
    const avg = (morning && evening) ? (morning+evening)/2 : (morning || evening || null);
    return {
      day: new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric'}),
      iso: d, morning, evening, avg
    };
  });

  const latest = chartData[chartData.length-1];
  const latestWeight = latest ? (latest.avg ?? latest.morning ?? latest.evening) : null;
  const first = chartData.find(c => c.avg != null);
  const startWeight = first ? first.avg : null;
  const totalChange = (latestWeight!=null && startWeight!=null) ? (latestWeight - startWeight) : null;
  const toGoal = (latestWeight!=null) ? (latestWeight - target) : null;

  const last7 = chartData.slice(-7).map(c=>c.avg).filter(v=>v!=null);
  const avg7 = last7.length ? (last7.reduce((a,b)=>a+b,0)/last7.length) : null;

  const save = () => {
    onSet(today, {
      morning: m===""?"":Number(m),
      evening: e===""?"":Number(e),
      note: n
    });
  };

  const Card = ({label, value, sub, accent, icon}) => (
    <div className="bg-white border border-zinc-200 rounded-2xl p-5">
      <div className="flex items-center justify-between mb-2">
        <div className={cn("w-9 h-9 rounded-xl text-white grid place-items-center", accent)}>
          <Icon name={icon} className="w-4 h-4"/>
        </div>
      </div>
      <div className="text-2xl font-bold text-zinc-900 tabular-nums">{value}</div>
      <div className="text-xs text-zinc-500 mt-0.5">{label}</div>
      {sub && <div className="text-[11px] mt-1 font-medium">{sub}</div>}
    </div>
  );

  const fmtKg = (v) => v==null ? "—" : Number(v).toFixed(1)+" kg";
  const signed = (v) => v==null ? null : (v>0?"+":"")+v.toFixed(1)+" kg";

  return (
    <div className="p-8 max-w-7xl mx-auto">
      <header className="mb-6 flex items-start justify-between gap-4">
        <div>
          <h1 className="text-3xl font-bold text-zinc-900 flex items-center gap-2">
            <Icon name="scale" className="w-7 h-7 text-emerald-600"/> Mukul's Weight Panel
          </h1>
          <p className="text-zinc-500 mt-1">Morning + evening weigh-in. Goal: <b className="text-emerald-700">{target} kg</b>.</p>
        </div>
        <div className="flex items-center gap-2 text-sm">
          <label className="text-xs text-zinc-500 uppercase tracking-wide">Goal</label>
          <input type="number" step="0.1" value={target}
            onChange={ev=>onTarget(ev.target.value)}
            className="w-20 px-2 py-1.5 rounded-lg border border-zinc-200 text-sm focus:ring-2 ring-emerald-500/30 outline-none"/>
          <span className="text-xs text-zinc-500">kg</span>
        </div>
      </header>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <Card icon="activity" label="Latest weight" value={fmtKg(latestWeight)} accent="bg-emerald-500"
          sub={toGoal!=null && <span className={toGoal>0?"text-amber-600":"text-emerald-600"}>{toGoal>0?`${toGoal.toFixed(1)} kg to go`:`At/under target!`}</span>}/>
        <Card icon="trending-down" label="Total change" value={signed(totalChange) || "—"} accent="bg-sky-500"
          sub={startWeight!=null && <span className="text-zinc-500">since {fmtKg(startWeight)}</span>}/>
        <Card icon="bar-chart-3" label="7-day avg" value={fmtKg(avg7)} accent="bg-violet-500"
          sub={<span className="text-zinc-500">{last7.length} entries</span>}/>
        <Card icon="target" label="Target" value={fmtKg(target)} accent="bg-amber-500"
          sub={<span className="text-zinc-500">Dec 31, 2026</span>}/>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* Today form */}
        <div className="bg-white border border-zinc-200 rounded-2xl p-6 lg:col-span-1">
          <div className="text-xs uppercase tracking-wide text-zinc-500 font-semibold mb-1">Today</div>
          <div className="text-lg font-bold text-zinc-900 mb-4">
            {new Date().toLocaleDateString(undefined,{weekday:'long', day:'numeric', month:'long'})}
          </div>

          <label className="text-xs uppercase tracking-wide text-zinc-500 font-semibold flex items-center gap-1.5">
            <Icon name="sunrise" className="w-3.5 h-3.5 text-amber-500"/> Morning weight
          </label>
          <div className="relative mt-1 mb-3">
            <input type="number" step="0.1" value={m} onChange={ev=>setM(ev.target.value)}
              placeholder="e.g. 68.2"
              className="w-full pr-12 px-3 py-3 text-2xl font-bold tabular-nums rounded-lg border border-zinc-200 focus:ring-2 ring-emerald-500/30 outline-none"/>
            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-zinc-400 font-semibold">kg</span>
          </div>

          <label className="text-xs uppercase tracking-wide text-zinc-500 font-semibold flex items-center gap-1.5">
            <Icon name="moon" className="w-3.5 h-3.5 text-indigo-500"/> Evening weight
          </label>
          <div className="relative mt-1 mb-3">
            <input type="number" step="0.1" value={e} onChange={ev=>setE(ev.target.value)}
              placeholder="e.g. 68.9"
              className="w-full pr-12 px-3 py-3 text-2xl font-bold tabular-nums rounded-lg border border-zinc-200 focus:ring-2 ring-emerald-500/30 outline-none"/>
            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-zinc-400 font-semibold">kg</span>
          </div>

          <label className="text-xs uppercase tracking-wide text-zinc-500 font-semibold">Note</label>
          <textarea value={n} onChange={ev=>setN(ev.target.value)} rows="2"
            placeholder="diet, workout, mood…"
            className="w-full mt-1 px-3 py-2 rounded-lg border border-zinc-200 text-sm focus:ring-2 ring-emerald-500/30 outline-none resize-none"/>

          <div className="flex justify-between items-center mt-3">
            <button onClick={save}
              className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1.5">
              <Icon name="save" className="w-4 h-4"/> Save today
            </button>
            {entries[today] && (
              <button onClick={()=>{if(confirm("Clear today's weight entry?")) onClear(today);}}
                className="text-xs text-zinc-400 hover:text-red-500">clear today</button>
            )}
          </div>
        </div>

        {/* Chart */}
        <div className="bg-white border border-zinc-200 rounded-2xl p-6 lg:col-span-2">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold text-zinc-900">Weight trend</h3>
            <div className="flex items-center gap-3 text-xs text-zinc-500">
              <span className="flex items-center gap-1"><span className="w-3 h-0.5 bg-amber-500"></span>morning</span>
              <span className="flex items-center gap-1"><span className="w-3 h-0.5 bg-indigo-500"></span>evening</span>
              <span className="flex items-center gap-1"><span className="w-3 h-0.5 border-t-2 border-dashed border-emerald-500"></span>goal</span>
            </div>
          </div>
          <div className="h-72">
            {chartData.length===0 ? (
              <div className="h-full grid place-items-center text-zinc-400 text-sm">No data yet — log your first weigh-in.</div>
            ) : (
              <ResponsiveContainer>
                <LineChart data={chartData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f1f1f1"/>
                  <XAxis dataKey="day" tick={{fontSize:11}} stroke="#a1a1aa"/>
                  <YAxis domain={['auto','auto']} tick={{fontSize:11}} stroke="#a1a1aa" unit=" kg"/>
                  <Tooltip formatter={(v)=>v==null?"—":Number(v).toFixed(1)+" kg"}/>
                  <Line type="monotone" dataKey="morning" stroke="#f59e0b" strokeWidth={2} dot={{r:3}} connectNulls/>
                  <Line type="monotone" dataKey="evening" stroke="#6366f1" strokeWidth={2} dot={{r:3}} connectNulls/>
                  {RC.ReferenceLine && (
                    <RC.ReferenceLine y={target} stroke="#10b981" strokeDasharray="5 5" label={{value:`Goal ${target}kg`, position:'right', fill:'#10b981', fontSize:11}}/>
                  )}
                </LineChart>
              </ResponsiveContainer>
            )}
          </div>
        </div>
      </div>

      {/* History */}
      <div className="mt-6 bg-white border border-zinc-200 rounded-2xl p-6">
        <div className="font-semibold text-zinc-900 mb-3 flex items-center gap-2">
          <Icon name="history" className="w-4 h-4"/> Recent weigh-ins
        </div>
        {sortedDays.length===0 ? (
          <div className="text-sm text-zinc-400 text-center py-6">No entries yet.</div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-[11px] uppercase tracking-wide text-zinc-500 border-b border-zinc-200">
                  <th className="py-2 pr-3">Date</th>
                  <th className="py-2 pr-3">Morning</th>
                  <th className="py-2 pr-3">Evening</th>
                  <th className="py-2 pr-3">Avg</th>
                  <th className="py-2 pr-3">Note</th>
                  <th className="py-2"></th>
                </tr>
              </thead>
              <tbody>
                {sortedDays.slice().reverse().slice(0,30).map(d=>{
                  const v = entries[d];
                  const mo = Number(v.morning)||null, ev = Number(v.evening)||null;
                  const av = (mo && ev) ? (mo+ev)/2 : (mo||ev||null);
                  return (
                    <tr key={d} className="border-b border-zinc-100 hover:bg-zinc-50/50">
                      <td className="py-2 pr-3 font-medium text-zinc-800">
                        {new Date(d).toLocaleDateString(undefined,{weekday:'short', day:'numeric', month:'short'})}
                      </td>
                      <td className="py-2 pr-3 tabular-nums">{mo!=null?mo.toFixed(1)+" kg":"—"}</td>
                      <td className="py-2 pr-3 tabular-nums">{ev!=null?ev.toFixed(1)+" kg":"—"}</td>
                      <td className="py-2 pr-3 tabular-nums font-semibold">{av!=null?av.toFixed(1)+" kg":"—"}</td>
                      <td className="py-2 pr-3 text-zinc-500 truncate max-w-xs">{v.note||""}</td>
                      <td className="py-2 text-right">
                        <button onClick={()=>{if(confirm("Delete this entry?")) onClear(d);}}
                          className="text-zinc-300 hover:text-red-500"><Icon name="trash-2" className="w-4 h-4"/></button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
